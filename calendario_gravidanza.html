<title>Calendario Gravidanza</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 14px; max-width: 780px; margin: auto; }
h1 { font-size: 18px; font-weight: 500; margin-bottom: 3px; }
.sub { font-size: 12px; color: #888; margin-bottom: 12px; line-height: 1.5; }
.progress-wrap { background: #e8e8e4; border-radius: 99px; height: 7px; margin: 10px 0 3px; }
.progress-fill { background: #1D9E75; height: 7px; border-radius: 99px; width: 0%; transition: width 0.6s ease; }
.progress-labels { display: flex; justify-content: space-between; font-size: 10px; color: #bbb; margin-bottom: 14px; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink:0; }

/* CARD */
.card { background: #fff; border: 1px solid #e4e4de; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.card.current { border: 2px solid #1D9E75; }
.card.past { opacity: 0.72; }

/* HEADER: fruit icon left, info right */
.week-header { display: flex; align-items: stretch; cursor: pointer; min-height: 64px; }

.fruit-col { width: 64px; min-width: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px; border-right: 1px solid #f0f0eb; gap: 2px; background: #fafaf8; }
.fruit-col svg { display: block; }
.fruit-label { font-size: 9px; color: #bbb; text-align: center; line-height: 1.2; max-width: 58px; }

.info-col { flex: 1; display: flex; align-items: center; gap: 8px; padding: 10px 10px 10px 10px; min-width: 0; }
.badge { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
.badge-past { background: #f0f0ec; color: #999; }
.badge-current { background: #E1F5EE; color: #085041; }
.badge-future { background: #EEEDFE; color: #3C3489; }

.wtitle { flex: 1; min-width: 0; }
.wnum { font-size: 13px; font-weight: 500; line-height: 1.3; }
.wdates { font-size: 10px; color: #bbb; margin-top: 2px; }

.tag { font-size: 9px; padding: 2px 7px; border-radius: 99px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.tag-past { background: #f0f0ec; color: #aaa; }
.tag-current { background: #E1F5EE; color: #085041; }
.tag-future { background: #EEEDFE; color: #3C3489; }
.chev { font-size: 14px; color: #ccc; transition: transform 0.2s; flex-shrink: 0; }
.chev.open { transform: rotate(180deg); }

/* BODY */
.week-body { border-top: 1px solid #f0f0eb; padding: 12px 12px; display: none; }
.week-body.open { display: block; }

/* Size banner inside body */
.size-banner { display: flex; align-items: center; gap: 12px; background: #f7f7f4; border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; }
.size-info .size-big { font-size: 16px; font-weight: 600; }
.size-info .size-like { font-size: 12px; color: #888; margin-top: 2px; }
.size-info .size-weight { font-size: 11px; color: #bbb; margin-top: 1px; }

.slabel { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #ccc; margin-bottom: 5px; margin-top: 11px; }
.slabel:first-child { margin-top: 0; }
.pills { display: flex; flex-wrap: wrap; gap: 5px; }
.pill { font-size: 11px; padding: 4px 9px; border-radius: 99px; line-height: 1.4; }
.p-baby { background: #E1F5EE; color: #085041; }
.p-mama { background: #EEEDFE; color: #3C3489; }
.p-exam { background: #FAEEDA; color: #633806; }
.p-note { background: #FAECE7; color: #4A1B0C; }

.summary-box { background: #f5f5f1; border-radius: 8px; padding: 10px 12px; }
.summary-box p { font-size: 12px; color: #555; line-height: 1.6; margin-bottom: 7px; }
.summary-box p:last-child { margin-bottom: 0; }
.summary-box strong { color: #1a1a1a; font-weight: 600; }
</style>

  const msPerDay = 86400000;
  const giorniTotali = Math.floor((oggi - DUM) / msPerDay);
  const settimane = Math.floor(giorniTotali / 7);
  const giorni = giorniTotali % 7;
  const settimanaCorrente = settimane + 1; // la settimana IN CORSO

  // Progress: settimane su 40
  const pct = Math.min(100, Math.round((giorniTotali / 280) * 100));
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = '▲ Oggi (' + settimane + '+' + giorni + ')';

})();

const art = {"limone":"una","mela":"una","pera":"una","cipolla":"una","patata dolce":"una","mango":"un","banana":"una","carota":"una","pannocchia":"una","pompelmo":"un","cetriolo":"un","cavolfiore":"un","zucchina":"una","melanzana":"una"};

function render() {
  const cont = document.getElementById('cards');
  weeks.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'card ' + w.state;
    // Calcola stato dinamicamente
    let dynState = w.state;
    if (typeof w.n === 'number' && window._settimanaCorrente !== undefined) {
      if (w.n < window._settimanaCorrente) dynState = 'past';
      else if (w.n === window._settimanaCorrente) dynState = 'current';
      else dynState = 'future';
    }
    const bCl = dynState==='current'?'badge-current':dynState==='past'?'badge-past':'badge-future';
    const tCl = dynState==='current'?'tag-current':dynState==='past'?'tag-past':'tag-future';
    const tLb = dynState==='current'?'← siete qui':dynState==='past'?'passato':'in arrivo';
    // Apri automaticamente la card corrente
    const isCurrentCard = (dynState === 'current');

    // fruit panel
    let fruitCol = '';
    if (w.summary) {
      fruitCol = `<div class="fruit-col"><svg width="36" height="36" viewBox="0 0 36 36"><text x="18" y="26" text-anchor="middle" font-size="22">🌱</text></svg><span class="fruit-label">1° trim.</span></div>`;
    } else if (w.svgKey && svgs[w.svgKey]) {
      const s = svgs[w.svgKey];
      fruitCol = `<div class="fruit-col">${s.mini}<span class="fruit-label">${s.cm}</span></div>`;
    }

    // body
    let bodyHTML = '';
    if (w.summary) {
      bodyHTML = `<div class="week-body" id="b${i}">
        <div class="summary-box">
          <p><strong>Cosino:</strong> ${w.baby.join(' · ')}</p>
          <p><strong>Mamma:</strong> ${w.mama.join(' · ')}</p>
          <p><strong>Esami:</strong> ${w.exam.join(' · ')}</p>
        </div></div>`;
    } else {
      const s = w.svgKey && svgs[w.svgKey] ? svgs[w.svgKey] : null;
      const banner = s ? `<div class="size-banner">
        ${s.big}
        <div class="size-info">
          <div class="size-big">${s.cm}</div>
          <div class="size-like">come ${art[s.name]||'un'} <strong>${s.name}</strong></div>
          <div class="size-weight">${s.g}</div>
        </div>
      </div>` : '';
      const bp = w.baby.map(x=>`<span class="pill p-baby">${x}</span>`).join('');
      const mp = w.mama.map(x=>`<span class="pill p-mama">${x}</span>`).join('');
      const ep = w.exam.map(x=>`<span class="pill p-exam">${x}</span>`).join('');
      const np = w.note.map(x=>`<span class="pill p-note">${x}</span>`).join('');
      bodyHTML = `<div class="week-body" id="b${i}">
        ${banner}
        <div class="slabel">Cosino</div><div class="pills">${bp}</div>
        <div class="slabel">Mamma</div><div class="pills">${mp}</div>
        ${ep?`<div class="slabel">Esami / visite</div><div class="pills">${ep}</div>`:''}
        ${np?`<div class="slabel">Note</div><div class="pills">${np}</div>`:''}
      </div>`;
    }

    card.innerHTML = `
      <div class="week-header" onclick="tog(${i})">
        ${fruitCol}
        <div class="info-col">
          <div class="badge ${bCl}">${w.n}</div>
          <div class="wtitle">
            <div class="wnum">${w.label}</div>
            <div class="wdates">${w.dates}</div>
          </div>
          <span class="tag ${tCl}">${tLb}</span>
          <span class="chev" id="c${i}">▾</span>
        </div>
      </div>${bodyHTML}`;
    cont.appendChild(card);

    if (isCurrentCard) {
      document.getElementById('b'+i).classList.add('open');
      document.getElementById('c'+i).classList.add('open');
    }
  });
}

function tog(i) {
  document.getElementById('b'+i).classList.toggle('open');
  document.getElementById('c'+i).classList.toggle('open');
}

render();
</script>
