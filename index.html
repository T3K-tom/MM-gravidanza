<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Il Viaggio">
<title>Il Viaggio — Scegli il tema</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#EEEDFE; --card:#FFFFFF; --text:#3C3489; --sub:#6B7280;
    --border:#D8D5F2; --shadow:rgba(60,52,137,0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#15132b; --card:#211d42; --text:#C7C2F0; --sub:#9691c4;
      --border:#332d5e; --shadow:rgba(0,0,0,0.4);
    }
  }
  html,body { height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; min-height:100dvh; padding:24px 20px; gap:26px;
  }
  h1 { font-size:1.5rem; font-weight:700; text-align:center; letter-spacing:.3px; }
  .sub { font-size:.9rem; color:var(--sub); text-align:center; margin-top:-14px; }
  .cards { display:flex; flex-direction:column; gap:16px; width:100%; max-width:420px; }
  .card {
    display:flex; align-items:center; gap:16px;
    background:var(--card); border:1.5px solid var(--border);
    border-radius:18px; padding:20px 18px; cursor:pointer;
    box-shadow:0 4px 14px var(--shadow); transition:transform .12s, box-shadow .12s;
    text-decoration:none; color:inherit;
  }
  .card:active { transform:scale(.97); box-shadow:0 2px 8px var(--shadow); }
  .emoji { font-size:2.4rem; line-height:1; flex-shrink:0; width:52px; text-align:center; }
  .info { display:flex; flex-direction:column; gap:3px; }
  .name { font-size:1.15rem; font-weight:700; }
  .desc { font-size:.82rem; color:var(--sub); }
  .arrow { margin-left:auto; font-size:1.2rem; color:var(--sub); flex-shrink:0; }
  .foot { font-size:.72rem; color:var(--sub); text-align:center; margin-top:6px; }
</style>
</head>
<body>
  <h1>Il Viaggio verso bimbo</h1>
  <p class="sub">Scegli il tema</p>

  <div class="cards">
    <a class="card" href="gherard.html">
      <div class="emoji">⚔️</div>
      <div class="info">
        <div class="name">Gherard</div>
        <div class="desc">Lo Strigo — tema Witcher</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="edward.html">
      <div class="emoji">🏴‍☠️</div>
      <div class="info">
        <div class="name">Edward</div>
        <div class="desc">Il piccolo pirata</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="plinio.html">
      <div class="emoji">🏛️</div>
      <div class="info">
        <div class="name">Plinio</div>
        <div class="desc">Il patrizio romano</div>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <p class="foot">Dati condivisi tra i temi · scelta non memorizzata</p>
</body>
</html>
